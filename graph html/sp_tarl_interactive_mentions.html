  <script>

        'view_control',
        'navigate',
        'compare',
        'external_link',

      function send(eventName, params) {
        if (typeof window === 'undefined' || !window.parent) return;
        if (window.parent === window) return;
        window.parent.postMessage(Object.assign({ type: 'cgd_analytics', event: eventName }, params), PARENT_ORIGIN);

      function trackView() {
        if (viewTracked) return;
        viewTracked = true;
        send('interactive_view', { interactive_name: INTERACTIVE_NAME });

      function trackEngagement(actionType, actionLabel, actionValue) {
        if (!VALID_ACTION_TYPES.has(actionType)) return;
        var params = {
          interactive_name: INTERACTIVE_NAME,
          action_type: actionType,
          action_label: actionLabel
        };
        if (actionValue !== undefined && actionValue !== null && actionValue !== '') {
          params.action_value = String(actionValue);
        }
        send('interactive_engagement', params);
      }

      window.CGDTracking = {
        INTERACTIVE_NAME: INTERACTIVE_NAME,
        trackView: trackView,
        trackEngagement: trackEngagement
      };
    })();

      }

      function clearElement(el) {
        while (el.firstChild) el.removeChild(el.firstChild);
      }

        var attrs = Object.assign({ x: x, y: y }, extra || {});
        if (className) attrs.class = className;
        var node = svgEl('text', attrs);
        node.textContent = text;
        parent.appendChild(node);
        return node;
      }

      function wrapText(text, maxChars, maxLines) {
        var words = String(text || '').split(/\s+/).filter(Boolean);
        var lines = [];
        var line = '';
        words.forEach(function (word) {
          var next = line ? line + ' ' + word : word;
          if (next.length <= maxChars || !line) {
            line = next;
          } else {
            lines.push(line);
            line = word;
          }
        });
        if (line) lines.push(line);
        if (maxLines && lines.length > maxLines) {
          lines = lines.slice(0, maxLines);
          lines[lines.length - 1] = lines[lines.length - 1].replace(/[.,;:]*$/, '') + '...';
        }
        return lines;
      }

      function textColorForBackground(hex) {
        var clean = hex.replace('#', '');
        var r = parseInt(clean.slice(0, 2), 16) / 255;
        var g = parseInt(clean.slice(2, 4), 16) / 255;
        var b = parseInt(clean.slice(4, 6), 16) / 255;
        var luminance = 0.2126 * r + 0.7152 * g + 0.0722 * b;
        return luminance > 0.62 ? '#1A272A' : '#ffffff';

        return topicId === 'structured-pedagogy' ? 'structured_pedagogy' : 'targeted_instruction_tarl';

      function computeTimelineLayouts(events, xForYear, plot, width, showBoxes) {

          var labelW = 38;
          var laneEnds = [];
          var layouts = events.map(function (event) {
            var markerX = xForYear(event.year);
            var labelX = clamp(markerX - labelW / 2, plot.left, plot.right - labelW);
            var lane = 0;
            while (laneEnds[lane] && laneEnds[lane] > labelX - 6) lane += 1;
            laneEnds[lane] = labelX + labelW;
            return {
              event: event,
              markerX: markerX,
              labelX: labelX,
              labelY: plot.axisY + 48 + lane * 18,
              boxX: labelX,
              boxY: plot.axisY + 48 + lane * 18,
              boxW: labelW,
              boxH: 0,
              labelLines: []
            };

          return {
            layouts: layouts,
            height: 58 + laneEnds.length * 18

        }

        var boxW = clamp(width < 820 ? 145 : 176, 128, Math.max(128, plot.innerWidth / 2));

          var boxX = clamp(markerX - boxW / 2, plot.left, plot.right - boxW);
          var labelLines = wrapText(event.label, width < 820 ? 20 : 24, 4);

          var lane = 0;
          while (lanes[lane] && lanes[lane] > boxX - laneGap) lane += 1;
          lanes[lane] = boxX + boxW;
          return {
            event: event,
            markerX: markerX,
            boxX: boxX,
            boxY: plot.axisY + 42 + lane * 80,
            boxW: boxW,
            boxH: boxH,
            labelLines: labelLines
          };
        });
        var maxBottom = layouts.reduce(function (max, item) {
          return Math.max(max, item.boxY + item.boxH);
        }, plot.axisY + 42);
        return { layouts: layouts, height: maxBottom - plot.axisY + 12 };
      }

        if (topic.id === 'structured-pedagogy' && width >= 620 && topic.segmentsByYear['2004']) {
          var cueTargetX = xForYear(2004);
          var cueTargetY = yForValue(0.72);
          var cueLabelX = clamp(cueTargetX + 76, plot.left + 120, plot.right - 120);
          var cueLabelY = Math.max(plot.top + 38, yForValue(1) - 40);
          var cue = svgEl('g', { class: 'evidence-cue' });
          cue.appendChild(svgEl('path', {
            class: 'evidence-cue-line',
            d: 'M' + (cueLabelX - 10) + ',' + (cueLabelY + 5) + ' C' + (cueLabelX - 44) + ',' + (cueLabelY + 12) + ' ' + (cueTargetX + 32) + ',' + (cueTargetY - 18) + ' ' + cueTargetX + ',' + cueTargetY,
            'marker-end': 'url(#evidence-arrowhead)'
          }));
          appendText(cue, 'Click for evidence', 'evidence-cue-label', cueLabelX, cueLabelY, { 'text-anchor': 'middle' });
          svg.appendChild(cue);
        }

        var timelineGroup = svgEl('g', { class: 'timeline' });
        svg.appendChild(timelineGroup);
        timeline.layouts.forEach(function (item) {
          var event = item.event;
          var group = svgEl('g', {
            class: 'timeline-callout',
            tabindex: '0',
            role: 'button',
            'aria-label': event.year + ': ' + event.label
          });
          group.__tooltipPayload = {
            type: 'timeline',
            topic: topic,
            event: event,
            anchorTopic: topicAnalyticsValue(topic.id)
          };
          attachTooltipHandlers(group);

          timelineGroup.appendChild(svgEl('line', {
            class: 'timeline-line',
            x1: item.markerX,
            x2: item.markerX,
            y1: plot.axisY + 4,
            y2: showTimelineBoxes ? item.boxY : item.labelY - 13
          }));
          group.appendChild(svgEl('circle', {
            class: 'timeline-dot',
            cx: item.markerX,
            cy: plot.axisY + 14,
            r: compact ? 5 : 6
          }));

          if (showTimelineBoxes) {
            group.appendChild(svgEl('line', {
              class: 'timeline-line',
              x1: item.markerX,
              x2: clamp(item.markerX, item.boxX + 8, item.boxX + item.boxW - 8),
              y1: plot.axisY + 20,
              y2: item.boxY
            }));
            group.appendChild(svgEl('rect', {
              x: item.boxX,
              y: item.boxY,
              width: item.boxW,
              height: item.boxH,
              rx: 2
            }));
            appendText(group, String(event.year), 'timeline-year', item.boxX + item.boxW / 2, item.boxY + 17, { 'text-anchor': 'middle' });
            item.labelLines.forEach(function (line, lineIndex) {
              appendText(group, line, 'timeline-label', item.boxX + item.boxW / 2, item.boxY + 36 + lineIndex * 14, { 'text-anchor': 'middle' });
            });
          } else {
            appendText(group, String(event.year), 'timeline-year', item.labelX + item.boxW / 2, item.labelY, { 'text-anchor': 'middle' });
          }
          timelineGroup.appendChild(group);
        });

        live.textContent = topic.title + ' rendered with ' + Object.keys(topic.yearTotals).length + ' years containing mentions.';
        if (window.CGDReportHeight) window.CGDReportHeight();
      }

      function attachTooltipHandlers(element) {
        element.addEventListener('pointerenter', function (event) {
          if (event.pointerType === 'touch') return;
          showTooltipForElement(element, event, false);
        });
        element.addEventListener('pointermove', function (event) {
          if (!pinned && !tooltip.hidden && event.pointerType !== 'touch') {
            positionTooltip(event.clientX, event.clientY);
          }
        });
        element.addEventListener('pointerleave', function () {
          scheduleHideTooltip();
        });
        element.addEventListener('focus', function () {
          showTooltipForElement(element, null, false);
        });
        element.addEventListener('blur', function () {
          scheduleHideTooltip();
        });
        element.addEventListener('click', function (event) {
          event.preventDefault();
          event.stopPropagation();
          showTooltipForElement(element, event, true);
          window.CGDTracking.trackEngagement('detail_open', element.__tooltipPayload.type === 'timeline' ? 'timeline_event' : 'mention_segment', element.__tooltipPayload.anchorTopic);
        });
        element.addEventListener('keydown', function (event) {
          if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault();
            showTooltipForElement(element, null, true);
            window.CGDTracking.trackEngagement('detail_open', element.__tooltipPayload.type === 'timeline' ? 'timeline_event' : 'mention_segment', element.__tooltipPayload.anchorTopic);
          }
          if (event.key === 'Escape') {
            hideTooltip();
          }
        });
      }

      function scheduleHideTooltip() {
        if (pinned) return;
        window.clearTimeout(closeTimer);
        closeTimer = window.setTimeout(function () {
          if (!tooltip.matches(':hover') && !tooltip.matches(':focus-within')) hideTooltip();
        }, 400);
      }

      tooltip.addEventListener('pointerenter', function () {
        window.clearTimeout(closeTimer);
      });
      tooltip.addEventListener('pointerleave', function () {
        scheduleHideTooltip();
      });
      tooltip.addEventListener('focusin', function () {
        window.clearTimeout(closeTimer);
      });
      tooltip.addEventListener('focusout', function () {
        scheduleHideTooltip();
      });
      document.addEventListener('click', function (event) {
        if (!pinned) return;
        if (tooltip.contains(event.target)) return;
        if (activeElement && activeElement.contains && activeElement.contains(event.target)) return;
        hideTooltip();
      });
      document.addEventListener('keydown', function (event) {
        if (event.key === 'Escape') hideTooltip();
      });

      function showTooltipForElement(element, event, shouldPin) {
        window.clearTimeout(closeTimer);
        pinned = shouldPin;
        setActiveElement(element);
        renderTooltipContent(element.__tooltipPayload);
        tooltip.hidden = false;
        var point = event && event.clientX ? { x: event.clientX, y: event.clientY } : elementCenter(element);
        positionTooltip(point.x, point.y);
        if (window.CGDReportHeight) window.CGDReportHeight();
      }

      function setActiveElement(element) {
        if (activeElement && activeElement.classList) activeElement.classList.remove('is-active');
        activeElement = element;
        if (activeElement && activeElement.classList) activeElement.classList.add('is-active');
      }

      function elementCenter(element) {
        var box = element.getBoundingClientRect();
        return {
          x: (box.left + box.right) / 2,
          y: box.top + Math.min(20, Math.max(0, box.height / 2))
        };
      }

      function hideTooltip() {
        window.clearTimeout(closeTimer);
        pinned = false;
        tooltip.hidden = true;
        clearElement(tooltip);
        setActiveElement(null);
        if (window.CGDReportHeight) window.CGDReportHeight();
      }

      function positionTooltip(clientX, clientY) {
        var frameBox = frame.getBoundingClientRect();
        var localX = clientX - frameBox.left;
        var localY = clientY - frameBox.top;
        tooltip.style.left = '0px';
        tooltip.style.top = '0px';
        var width = tooltip.offsetWidth;
        var height = tooltip.offsetHeight;
        var left = localX - 12;
        if (left + width > frame.clientWidth - 8) {
          left = localX - width + 12;
        }
        left = clamp(left, 8, Math.max(8, frame.clientWidth - width - 8));
        var top = localY - 12;
        if (top + height > frame.clientHeight - 4) {
          top = localY - height + 12;
        }
        top = clamp(top, 8, Math.max(8, frame.clientHeight - height - 4));
        tooltip.style.left = left + 'px';
        tooltip.style.top = top + 'px';
      }

      function renderTooltipContent(payload) {
        clearElement(tooltip);
        if (payload.type === 'segment') {
          renderSegmentTooltip(payload);
        } else {
          renderTimelineTooltip(payload);
        }
      }

      function renderHeader(kicker, titleText, metaText) {
        var header = document.createElement('div');
        header.className = 'tooltip-header';
        var titleWrap = document.createElement('div');
        var kickerEl = document.createElement('div');
        kickerEl.className = 'tooltip-kicker';
        kickerEl.textContent = kicker;
        var title = document.createElement('div');
        title.className = 'tooltip-title';
        title.textContent = titleText;
        titleWrap.appendChild(kickerEl);
        titleWrap.appendChild(title);
        header.appendChild(titleWrap);
        if (pinned) {
          var close = document.createElement('button');
          close.type = 'button';
          close.textContent = 'Close';
          close.addEventListener('click', function () {
            window.CGDTracking.trackEngagement('detail_close', 'tooltip', undefined);
            hideTooltip();
          });
          header.appendChild(close);
        }
        tooltip.appendChild(header);
        if (metaText) {
          var meta = document.createElement('div');
          meta.className = 'tooltip-meta';
          meta.textContent = metaText;
          tooltip.appendChild(meta);
        }
      }

      function renderSegmentTooltip(payload) {
        var segment = payload.segment;
        renderHeader(
          segment.country + ' · ' + segment.year,
          'Matched text from plan/report',
          null
        );
        segment.mentions.forEach(function (mention, index) {
          var item = document.createElement('div');
          item.className = 'mention';
          var title = document.createElement('div');
          title.className = 'mention-title';
          title.textContent = mention.reportName || 'Untitled report';
          item.appendChild(title);
          if (mention.url) {
            var link = document.createElement('a');
            link.href = mention.url;
            link.target = '_blank';
            link.rel = 'noopener noreferrer';
            link.textContent = 'View source';
            link.addEventListener('click', function () {
              window.CGDTracking.trackEngagement('external_link', 'source_url', payload.anchorTopic);
            });
            item.appendChild(link);
          }
          if (mention.excerpt) {
            var label = document.createElement('div');
            label.className = 'excerpt-label';
            label.textContent = 'Text our method identified as showing this smart buy';
            item.appendChild(label);
            var excerpt = document.createElement('div');
            excerpt.className = 'excerpt';
            excerpt.textContent = mention.excerpt;
            item.appendChild(excerpt);
          }
          if (mention.contextExcerpt) {
            var details = document.createElement('details');
            details.className = 'more-context';
            var summary = document.createElement('summary');
            summary.textContent = 'Show more surrounding text';
            details.appendChild(summary);
            var context = document.createElement('div');
            context.className = 'excerpt';
            context.textContent = mention.contextExcerpt;
            details.appendChild(context);
            details.addEventListener('toggle', function () {
              if (details.open) {
                window.CGDTracking.trackEngagement('detail_open', 'surrounding_text', payload.anchorTopic);
              }
              if (window.CGDReportHeight) window.CGDReportHeight();
            });
            item.appendChild(details);
          }
          tooltip.appendChild(item);
        });
      }

      function renderTimelineTooltip(payload) {
        var event = payload.event;
        renderHeader(String(event.year), event.label, null);
        var detail = document.createElement('div');
        detail.className = 'excerpt';
        detail.textContent = event.detail;
        tooltip.appendChild(detail);
        var sources = String(event.source || '').split(';').map(function (value) { return value.trim(); }).filter(Boolean);
        if (sources.length) {
          var links = document.createElement('div');
          links.className = 'source-links mention';
          sources.forEach(function (source, index) {
            if (index) links.appendChild(document.createTextNode(' · '));
            var link = document.createElement('a');
            link.href = source;
            link.target = '_blank';
            link.rel = 'noopener noreferrer';
            link.textContent = sources.length === 1 ? 'Source' : 'Source ' + (index + 1);
            link.addEventListener('click', function () {
              window.CGDTracking.trackEngagement('external_link', 'timeline_source', payload.anchorTopic);
            });
            links.appendChild(link);
          });
          tooltip.appendChild(links);
        }
      }

      buildTabs();
      render();
      window.CGDTracking.trackView();

      if (window.ResizeObserver) {
        var resizeTimer = null;
        new ResizeObserver(function () {
          window.clearTimeout(resizeTimer);
          resizeTimer = window.setTimeout(render, 80);
        }).observe(frame);
      } else {
        window.addEventListener('resize', render);
      }
      if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(render);
      }
    })();
  </script>
</body>
</html>
